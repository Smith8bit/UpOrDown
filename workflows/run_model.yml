name: Run Model

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 10pm UTC = 5pm ET (adjust for DST)
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install torch yfinance ta pandas pandas_market_calendars

      - name: Run model
        run: python run_model.py

      - name: Commit updated results.csv
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results.csv
          git diff --staged --quiet || git commit -m "prediction: $(date +'%Y-%m-%d')"
          git push